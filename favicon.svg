<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- 定义渐变 -->
  <defs>
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E86DE;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- 背景圆（可选，增加辨识度） -->
  <circle cx="50" cy="50" r="48" fill="white"/>
  
  <!-- 无限符号 ∞ 与 S 融合的主图形 -->
  <g transform="translate(0, 5)" filter="url(#shadow)">
    <!-- 外圈 - 较大的椭圆形成∞的右半部分 -->
    <ellipse cx="60" cy="45" rx="28" ry="20" 
             fill="none" 
             stroke="url(#brandGradient)" 
             stroke-width="4.5"
             transform="rotate(-25 60 45)"/>
    
    <!-- 内圈 - 较小的椭圆形成∞的左半部分，同时构成 S 的上半部 -->
    <ellipse cx="38" cy="45" rx="22" ry="16" 
             fill="none" 
             stroke="url(#brandGradient)" 
             stroke-width="4.5"
             transform="rotate(25 38 45)"/>
    
    <!-- 连接弧线 - 完成 S 形的流动感 -->
    <path d="M 46 33 Q 54 45 46 57" 
          fill="none" 
          stroke="url(#brandGradient)" 
          stroke-width="4.5" 
          stroke-linecap="round"/>
  </g>
</svg>
